<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no" />
<meta name="theme-color" content="#0a0005" />
<meta name="color-scheme" content="dark" />
<meta name="referrer" content="no-referrer" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' blob:; font-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" />
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
<title>Moonlight</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon-512.png" />
<style>
:root{
  --bg-0:#050003; --bg-1:#0a0005;
  --ink:#e8e8f0; --ink-dim:#8a8493; --ink-faint:#3a3540;
  --blood:#c0392b; --blood-deep:#8b0000; --blood-glow:#ff2d55;
  --moon:#f5f0e0;
  --glass:rgba(20,5,10,0.6); --glass-edge:rgba(192,57,43,0.3);
  --silver:rgba(232,232,240,0.08); --silver-edge:rgba(232,232,240,0.18);
  --r:14px;
  --shadow-red:0 0 24px rgba(192,57,43,0.4), 0 8px 32px rgba(0,0,0,0.7);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;background:var(--bg-0);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased}
body{position:fixed;inset:0;overscroll-behavior:none;touch-action:manipulation}
button,input,textarea,select{font:inherit;color:inherit;background:none;border:0;outline:0}
::selection{background:var(--blood);color:#fff}
::-webkit-scrollbar{width:0;height:0}
#embers{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ember{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--moon);box-shadow:0 0 8px var(--blood-glow);opacity:0}
.screen{position:fixed;inset:0;display:none;flex-direction:column;z-index:2}
.screen.on{display:flex}
.center{display:flex;align-items:center;justify-content:center;flex-direction:column;padding:18px;text-align:center;gap:14px;width:100%;height:100%;overflow-y:auto}
h1.title{font-size:30px;margin:0;font-weight:600;letter-spacing:0.5px;background:linear-gradient(135deg,var(--moon),var(--blood-glow));-webkit-background-clip:text;background-clip:text;color:transparent}
h2.subtitle{font-size:18px;margin:0;font-weight:600;color:var(--moon)}
p.sub{color:var(--ink-dim);font-size:13px;margin:0;max-width:340px;line-height:1.5}
.bigbox{width:100%;max-width:380px;min-height:90px;padding:12px;border-radius:14px;background:var(--glass);border:1px solid var(--glass-edge);color:var(--ink);font-family:ui-monospace,monospace;font-size:10px;word-break:break-all;line-height:1.4;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);resize:none}
.bigbox:focus{border-color:var(--blood)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 22px;border-radius:16px;background:linear-gradient(135deg,var(--blood-deep),var(--blood));color:#fff;font-weight:700;font-size:14px;letter-spacing:0.5px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);box-shadow:var(--shadow-red);transition:transform .15s,filter .2s;-webkit-user-select:none;user-select:none;width:100%;max-width:380px}
.btn:hover{filter:brightness(1.1)}
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:0.4;cursor:not-allowed;filter:grayscale(0.5)}
.btn.ghost{background:transparent;border:1px solid var(--silver-edge);color:var(--ink);font-weight:500;box-shadow:none}
.btn.ghost:hover{background:var(--silver);border-color:var(--blood)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;width:100%;max-width:380px}
.btn-row .btn{flex:1;min-width:130px;padding:12px 14px;font-size:13px}
input[type=password]{width:100%;max-width:340px;padding:14px 18px;border-radius:16px;background:var(--glass);border:1px solid var(--glass-edge);color:var(--ink);letter-spacing:0.5px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);font-size:15px;text-align:center}
input[type=password]:focus{border-color:var(--blood);box-shadow:0 0 0 3px rgba(192,57,43,0.2)}
#moon{filter:drop-shadow(0 0 18px rgba(245,240,224,0.5));width:60px;height:60px;cursor:pointer;transition:transform .4s}
#moon:active{transform:scale(0.95)}
.chat-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid rgba(192,57,43,0.12);background:linear-gradient(180deg,rgba(10,0,5,0.9),rgba(10,0,5,0.5));backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);position:relative;z-index:5}
.status-pill{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;background:var(--glass);border:1px solid var(--glass-edge);font-size:12px;color:var(--ink-dim)}
.dot{width:7px;height:7px;border-radius:50%;background:#5fd47f;box-shadow:0 0 8px #5fd47f}
.dot.wait{background:#f0c14b;animation:pulse 1.4s ease-in-out infinite;box-shadow:none}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
#messages{flex:1;overflow-y:auto;padding:18px 16px 8px;display:flex;flex-direction:column;gap:7px;scroll-behavior:smooth;position:relative;z-index:2}
.msg{display:flex;flex-direction:column;max-width:78%;animation:pop .25s cubic-bezier(.2,.9,.3,1.2)}
.msg.from-me{align-self:flex-end;align-items:flex-end}
.msg.from-them{align-self:flex-start;align-items:flex-start}
@keyframes pop{from{opacity:0;transform:translateY(6px) scale(0.96)}to{opacity:1;transform:none}}
.bubble{padding:10px 14px;border-radius:18px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);word-wrap:break-word;overflow-wrap:anywhere}
.msg.from-them .bubble{background:var(--glass);border:1px solid var(--silver-edge);color:var(--ink);border-bottom-left-radius:6px}
.msg.from-me .bubble{background:linear-gradient(135deg,rgba(139,0,0,0.85),rgba(192,57,43,0.85));border:1px solid rgba(255,45,85,0.3);color:#fff;border-bottom-right-radius:6px;box-shadow:0 4px 22px rgba(192,57,43,0.4)}
.bubble.img,.bubble.vid{padding:5px;border-radius:18px;overflow:hidden;background:#000}
.bubble.img img,.bubble.vid video{display:block;max-width:100%;max-height:340px;border-radius:13px;cursor:pointer}
.meta-line{font-size:10px;color:var(--ink-faint);margin-top:3px;padding:0 6px}
.read{color:var(--blood-glow);font-weight:700;letter-spacing:1px}
.read.wait{color:var(--ink-faint);font-weight:400}
#composer{padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:linear-gradient(0deg,rgba(5,0,3,0.95),rgba(5,0,3,0.6));border-top:1px solid rgba(192,57,43,0.12);display:flex;gap:8px;align-items:flex-end}
#composer textarea{flex:1;resize:none;min-height:42px;max-height:140px;padding:11px 14px;border-radius:22px;background:var(--glass);border:1px solid var(--silver-edge);color:var(--ink)}
#composer textarea::placeholder{color:var(--ink-faint)}
.send-btn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--blood-deep),var(--blood));display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;box-shadow:0 0 18px rgba(192,57,43,0.5);transition:transform .15s,filter .2s}
.send-btn:active{transform:scale(0.92)}
.attach{width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-dim)}
.toast{position:fixed;left:50%;bottom:90px;transform:translate(-50%,20px);padding:11px 18px;background:var(--glass);border:1px solid var(--glass-edge);border-radius:999px;color:var(--ink);font-size:13px;backdrop-filter:blur(14px);box-shadow:var(--shadow-red);opacity:0;pointer-events:none;transition:all .25s;z-index:100;max-width:90vw;text-align:center}
.toast.on{opacity:1;transform:translate(-50%,0)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal.on{display:flex}
.modal img,.modal video{max-width:100%;max-height:90vh;border-radius:12px}
@media (max-width:480px){h1.title{font-size:24px}}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01s !important;transition-duration:0.01s !important}}
</style>
</head>
<body>

<div id="embers"></div>

<!-- ===== LOCK ===== -->
<section id="lock" class="screen on">
  <div class="center">
    <div id="moon" role="img" aria-label="moon">
      <svg viewBox="0 0 64 64" width="60" height="60">
        <defs><radialGradient id="mg" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#fffbe8"/><stop offset="60%" stop-color="#f5f0e0"/><stop offset="100%" stop-color="#b8b29a"/></radialGradient></defs>
        <circle cx="32" cy="32" r="30" fill="rgba(245,240,224,0.15)"/>
        <circle cx="32" cy="32" r="22" fill="url(#mg)"/>
        <circle cx="26" cy="26" r="3" fill="#a8a290" opacity="0.55"/>
        <circle cx="38" cy="34" r="2.2" fill="#a8a290" opacity="0.45"/>
        <circle cx="30" cy="40" r="1.8" fill="#a8a290" opacity="0.55"/>
      </svg>
    </div>
    <h1 class="title">Moonlight</h1>
    <p class="sub">"two hearts. one channel. forever."</p>
    <form id="lockForm" style="display:flex;flex-direction:column;gap:12px;align-items:center;width:100%">
      <input type="password" id="pw" placeholder="password" autocomplete="off" />
      <button class="btn" id="enterBtn" type="submit">enter</button>
      <div id="lockErr" style="color:var(--blood-glow);font-size:12px;min-height:16px"></div>
    </form>
  </div>
</section>

<!-- ===== PAIR (the only mid screen, no jargon) ===== -->
<section id="pair" class="screen">
  <div class="center">
    <h2 class="subtitle" id="pairTitle">connect</h2>
    <p class="sub" id="pairSub">copy this. send it to her. she pastes hers back.</p>

    <div id="step1" style="display:flex;flex-direction:column;gap:12px;align-items:center;width:100%;max-width:380px">
      <p class="sub" style="font-size:11px;opacity:0.7">① your code</p>
      <textarea id="myCode" class="bigbox" readonly placeholder="generating…"></textarea>
      <button class="btn" id="copyMy">copy my code</button>
    </div>

    <div style="height:8px;width:80%;max-width:380px;background:linear-gradient(90deg,transparent,rgba(192,57,43,0.4),transparent)"></div>

    <div id="step2" style="display:flex;flex-direction:column;gap:12px;align-items:center;width:100%;max-width:380px">
      <p class="sub" style="font-size:11px;opacity:0.7">② her code (paste here)</p>
      <textarea id="herCode" class="bigbox" placeholder="paste her code from WhatsApp…"></textarea>
      <button class="btn" id="connectBtn">connect</button>
    </div>

    <div id="statusBox" class="status-pill" style="display:none"><span class="dot" id="statusDot"></span><span id="statusText">connecting</span></div>

    <p class="sub" style="font-size:10px;opacity:0.5;max-width:340px">no servers, no third parties. direct phone to phone. works on every network.</p>
  </div>
</section>

<!-- ===== CHAT ===== -->
<section id="chat" class="screen">
  <header class="chat-head">
    <div class="status-pill"><span class="dot" id="chatDot"></span><span id="chatStatus">connected</span></div>
    <button class="btn ghost" id="exitBtn" style="padding:6px 14px;font-size:12px;width:auto">exit</button>
  </header>
  <div id="messages"></div>
  <div id="composer">
    <label class="attach" for="fileInput">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.4 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
    </label>
    <input type="file" id="fileInput" accept="image/*,video/*" hidden />
    <textarea id="msgInput" placeholder="breathe in… type…" rows="1" maxlength="20000"></textarea>
    <button class="send-btn" id="sendBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.97 11.12l8.51-8.5a.75.75 0 0 1 1.06 0l8.5 8.5a.75.75 0 0 1-.99 1.13L13.5 5.7v13.55a.75.75 0 0 1-1.5 0V5.7l-6.57 6.55a.75.75 0 1 1-.99-1.13z"/></svg>
    </button>
  </div>
</section>

<div id="mediaModal" class="modal"><div id="mediaWrap"></div></div>
<div id="toast" class="toast"></div>

<script>
"use strict";

// ============================================================
// MOONLIGHT v5 — copy-paste pairing. zero servers, zero brokers.
// Pure WebRTC offer/answer exchanged over WhatsApp / SMS / any chat.
// Works on every network including airplane mode between two phones.
// ============================================================

// ===== UTILS =====
const $=s=>document.querySelector(s);
const enc=new TextEncoder(),dec=new TextDecoder();
const rand=n=>{const a=new Uint8Array(n);crypto.getRandomValues(a);return a};
const ID=()=>Array.from(rand(16)).map(x=>x.toString(16).padStart(2,"0")).join("");
const IDshort=()=>Array.from(rand(8)).map(x=>x.toString(16).padStart(2,"0")).join("").slice(0,10);
const toast=(m,t)=>{const e=$("#toast");e.textContent=m;e.classList.add("on");clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove("on"),t||2400)};
function screen(n){["lock","pair","chat"].forEach(x=>$("#"+x).classList.remove("on"));$("#"+n).classList.add("on");}
function b64(a){let s="";for(let i=0;i<a.length;i++)s+=String.fromCharCode(a[i]);return btoa(s)}
function unb64(s){const a=atob(s);const o=new Uint8Array(a.length);for(let i=0;i<a.length;i++)o[i]=a.charCodeAt(i);return o}

// ===== CRYPTO (PBKDF2 + AES-GCM 256) =====
async function deriveKey(pw,salt){
  const baseKey=await crypto.subtle.importKey("raw",enc.encode(pw),{name:"PBKDF2"},false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:310000,hash:"SHA-256"},baseKey,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
}
async function encrypt(obj,key){
  const iv=rand(12);
  const data=enc.encode(typeof obj==="string"?obj:JSON.stringify(obj));
  const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,data);
  return {iv:b64(new Uint8Array(iv)),ct:b64(new Uint8Array(ct))};
}
async function decrypt(o,key){
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:unb64(o.iv)},key,unb64(o.ct));
  try{return JSON.parse(dec.decode(pt))}catch{return dec.decode(pt)}
}

// ===== STORAGE =====
let DB=null;
const DBN="moon_v5",META="meta",MSG="msg";
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DBN,1);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(META))d.createObjectStore(META,{keyPath:"k"});if(!d.objectStoreNames.contains(MSG))d.createObjectStore(MSG,{keyPath:"id"})};r.onsuccess=()=>{DB=r.result;res()};r.onerror=()=>rej(r.error)})}
const dbGet=(s,k)=>new Promise(r=>{const t=DB.transaction(s,"readonly");const g=t.objectStore(s).get(k);g.onsuccess=()=>r(g.result)});
const dbPut=(s,v)=>new Promise(r=>{const t=DB.transaction(s,"readwrite");t.objectStore(s).put(v);t.oncomplete=r});
const dbAll=(s)=>new Promise(r=>{const t=DB.transaction(s,"readonly");const g=t.objectStore(s).getAll();g.onsuccess=()=>r(g.result)});

// ===== STATE =====
const S={key:null,pc:null,dc:null};

// ===== EMBERS =====
function spawnEmber(){
  const e=document.createElement("div");e.className="ember";
  e.style.left=(Math.random()*100)+"vw";
  const dur=8+Math.random()*10;const drift=(Math.random()-0.5)*60;
  e.animate([{transform:"translateY(110vh) translateX(0)",opacity:0},{transform:`translateY(-10vh) translateX(${drift}px) scale(1)`,opacity:1,offset:.1},{transform:`translateY(-30vh) translateX(${drift*1.4}px) scale(0.3)`,opacity:0}],{duration:dur*1000,easing:"linear"}).onfinish=()=>e.remove();
  $("#embers").appendChild(e);
}
setInterval(spawnEmber,650);

// ===== LOCK =====
$("#lockForm").addEventListener("submit",async e=>{
  e.preventDefault();
  const pw=$("#pw").value;
  if(!pw||pw.length<3){$("#lockErr").textContent="password required";return}
  $("#enterBtn").disabled=true;$("#lockErr").textContent="";
  try{
    await openDB();
    let saltMeta=await dbGet(META,"salt");
    let salt;
    if(saltMeta&&saltMeta.v){
      salt=new Uint8Array(saltMeta.v);
      S.key=await deriveKey(pw,salt);
      const canary=await dbGet(META,"canary");
      if(canary){
        try{const ok=await decrypt({iv:canary.v.iv,ct:canary.v.ct},S.key);if(ok!=="ok")throw 0}
        catch{$("#lockErr").textContent="wrong password";$("#enterBtn").disabled=false;S.key=null;return}
      }
    }else{
      salt=rand(16);
      S.key=await deriveKey(pw,salt);
      const c=await encrypt("ok",S.key);
      await dbPut(META,{k:"salt",v:Array.from(salt)});
      await dbPut(META,{k:"canary",v:c});
    }
    S.key=await deriveKey(pw,salt);
    await setupPair();
  }catch(err){
    console.error(err);$("#lockErr").textContent="error: "+err.message;
  }
  $("#enterBtn").disabled=false;
});

// ===== PAIR SCREEN =====
async function setupPair(){
  screen("pair");
  // host = makes the offer (will start the data channel)
  const myId=IDshort();
  $("#myCode").value="generating…";
  try{
    const pc=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
    const dc=pc.createDataChannel("moon",{ordered:true});
    S.pc=pc;
    wireDC(dc);
    pc.onicecandidate=()=>{}; // we'll serialize at end
    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    // wait for ICE gathering to complete
    await new Promise(r=>{if(pc.iceGatheringState==="complete")return r();pc.onicegatheringstatechange=()=>{if(pc.iceGatheringState==="complete")r()}});
    const sdp=pc.localDescription;
    const payload={myId,sdp:{type:sdp.type,sdp:sdp.sdp}};
    $("#myCode").value=b64(enc.encode(JSON.stringify(payload)));
    $("#copyMy").onclick=async()=>{
      try{await navigator.clipboard.writeText($("#myCode").value);toast("copied! send it to her")}
      catch{const r=document.createRange();r.selectNodeContents($("#myCode"));const s=getSelection();s.removeAllRanges();s.addRange(r);toast("long-press the box to copy")}
    };
    // when she pastes, accept
    $("#connectBtn").onclick=async()=>{
      const raw=$("#herCode").value.trim();
      if(!raw){toast("paste her code first");return}
      try{
        const obj=JSON.parse(dec.decode(unb64(raw)));
        if(!obj||!obj.sdp||!obj.sdp.sdp){toast("bad code");return}
        await pc.setRemoteDescription(new RTCSessionDescription(obj.sdp));
        toast("connecting…");
      }catch(err){console.warn(err);toast("bad code format")}
    };
  }catch(err){
    console.error(err);
    $("#myCode").value="error: "+err.message+"\n\nWebRTC not supported on this browser?";
  }
}

// ===== ACCEPT INCOMING OFFER (if i paste her code first) =====
// in v5 you can be either side. we auto-detect: if your paste looks like an offer (type=offer), become answerer.
$("#herCode").addEventListener("paste",()=>setTimeout(async()=>{
  const raw=$("#herCode").value.trim();
  if(!raw||raw.length<30)return;
  try{
    const obj=JSON.parse(dec.decode(unb64(raw)));
    if(!obj||!obj.sdp)return;
    if(obj.sdp.type==="offer"){
      // i am guest — accept her offer, generate answer
      $("#myCode").value="generating answer…";
      const pc=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
      S.pc=pc;
      pc.ondatachannel=ev=>wireDC(ev.channel);
      pc.onicecandidate=()=>{};
      await pc.setRemoteDescription(new RTCSessionDescription(obj.sdp));
      const ans=await pc.createAnswer();await pc.setLocalDescription(ans);
      await new Promise(r=>{if(pc.iceGatheringState==="complete")return r();pc.onicegatheringstatechange=()=>{if(pc.iceGatheringState==="complete")r()}});
      const payload={myId:IDshort(),sdp:{type:pc.localDescription.type,sdp:pc.localDescription.sdp}};
      $("#myCode").value=b64(enc.encode(JSON.stringify(payload)));
      $("#copyMy").onclick=async()=>{
        try{await navigator.clipboard.writeText($("#myCode").value);toast("answer ready — send back to her")}
        catch{const r=document.createRange();r.selectNodeContents($("#myCode"));const s=getSelection();s.removeAllRanges();s.addRange(r);toast("long-press the box to copy")}
      };
      $("#pairSub").textContent="send your answer back to her. she'll paste it to connect.";
    }
  }catch(err){/* not an offer, fine */}
},100));

// ===== DATACHANNEL =====
function wireDC(dc){
  S.dc=dc;
  dc.onopen=()=>{
    enterChat();
  };
  dc.onmessage=async ev=>{
    let data;try{data=JSON.parse(ev.data)}catch{return};
    if(data.t==="m"){
      try{const m=await decrypt({iv:data.iv,ct:data.ct},S.key);renderMsg(m,"them")}catch(e){console.warn("decrypt fail",e)}
    }else if(data.t==="read"){markRead(data.id)}
  };
  dc.onclose=()=>{S.dc=null};
}

// ===== CHAT =====
async function saveMsg(m){const c=await encrypt(m,S.key);await dbPut(MSG,{id:m.id,iv:c.iv,ct:c.ct,ts:m.ts,from:m.from})}
async function loadMsg(){
  const all=await dbAll(MSG);const out=[];
  for(const r of all){try{const m=await decrypt({iv:r.iv,ct:r.ct},S.key);out.push({...m,id:r.id,ts:r.ts})}catch{}}
  return out.sort((a,b)=>a.ts-b.ts);
}
$("#msgInput").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}});
$("#msgInput").addEventListener("input",()=>{const t=$("#msgInput");t.style.height="auto";t.style.height=Math.min(140,t.scrollHeight)+"px"});
$("#sendBtn").addEventListener("click",send);
$("#fileInput").addEventListener("change",async e=>{
  const f=e.target.files[0];if(!f)return;
  if(f.size>100*1024*1024){toast("too big — max 100mb");e.target.value="";return}
  const r=new FileReader();
  r.onload=async()=>{
    const isV=f.type.startsWith("video/"),isI=f.type.startsWith("image/");
    if(!isV&&!isI){toast("images or videos only");return}
    const m={id:ID(),type:isV?"video":"image",dataUrl:r.result,ts:Date.now(),from:"me",fileName:f.name,fileSize:f.size};
    await saveMsg(m);renderMsg(m,"me");sendWire(m);
  };
  r.readAsDataURL(f);e.target.value="";
});
async function send(){
  const txt=$("#msgInput").value.trim();if(!txt)return;
  $("#msgInput").value="";$("#msgInput").style.height="auto";
  const m={id:ID(),type:"text",text:txt,ts:Date.now(),from:"me"};
  await saveMsg(m);renderMsg(m,"me");sendWire(m);
}
async function sendWire(m){
  if(!S.dc||S.dc.readyState!=="open"){toast("not connected");return}
  const c=await encrypt(m,S.key);
  try{S.dc.send(JSON.stringify({t:"m",iv:c.iv,ct:c.ct,id:m.id,ts:m.ts}))}catch(e){toast("send fail")}
}
function renderMsg(m,who){
  const list=$("#messages");
  const d=document.createElement("div");d.className="msg from-"+who;d.dataset.id=m.id;
  const b=document.createElement("div");b.className="bubble";
  if(m.type==="image"){b.classList.add("img");const i=document.createElement("img");i.src=m.dataUrl;i.onclick=()=>openMedia("img",m.dataUrl);b.appendChild(i)}
  else if(m.type==="video"){b.classList.add("vid");const v=document.createElement("video");v.src=m.dataUrl;v.controls=true;b.appendChild(v)}
  else{b.textContent=m.text}
  d.appendChild(b);
  const ml=document.createElement("div");ml.className="meta-line";
  const t=new Date(m.ts);const hh=String(t.getHours()).padStart(2,"0"),mm=String(t.getMinutes()).padStart(2,"0");
  ml.innerHTML=`<span>${hh}:${mm}</span>`+(who==="me"?`<span class="read wait" data-rid="${m.id}">sent</span>`:"");
  d.appendChild(ml);list.appendChild(d);
  $("#messages").scrollTo({top:9e9,behavior:"smooth"});
}
function markRead(id){const e=document.querySelector(`[data-rid="${id}"]`);if(e){e.classList.remove("wait");e.classList.add("read");e.textContent="read"}}
function openMedia(k,u){const w=$("#mediaWrap");w.innerHTML="";const e=k==="img"?document.createElement("img"):document.createElement("video");e.src=u;if(k!=="img")e.controls=true;w.appendChild(e);$("#mediaModal").classList.add("on")}
$("#mediaModal").addEventListener("click",()=>$("#mediaModal").classList.remove("on"));
async function enterChat(){
  screen("chat");
  const msgs=await loadMsg();
  const list=$("#messages");list.innerHTML="";
  for(const m of msgs)renderMsg(m,m.from==="me"?"me":"them");
  $("#messages").scrollTo({top:9e9});
}
$("#exitBtn").addEventListener("click",()=>{
  if(confirm("exit to chat again later?")){
    if(S.dc)try{S.dc.close()}catch(e){};
    if(S.pc)try{S.pc.close()}catch(e){};
    screen("lock");$("#pw").value="";
  }
});

// ===== MOON TRIPLE TAP = PANIC WIPE =====
let moonTaps=0,moonT=0;
$("#moon").addEventListener("click",()=>{
  moonTaps++;clearTimeout(moonT);
  moonT=setTimeout(()=>{moonTaps=0},800);
  if(moonTaps>=3){
    moonTaps=0;
    if(confirm("WIPE everything? cannot undo.")){
      try{indexedDB.deleteDatabase(DBN)}catch(e){}
      setTimeout(()=>location.href=location.origin+location.pathname,300);
    }
  }
});

// ===== KONAMI =====
const K=["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowLeft","ArrowRight","ArrowLeft","ArrowRight","b","a"];
let kI=0;
window.addEventListener("keydown",e=>{
  const k=e.key.length===1?e.key.toLowerCase():e.key;
  if(k===K[kI]){kI++;if(kI===K.length){kI=0;for(let i=0;i<40;i++)setTimeout(spawnEmber,i*30);toast("🌙 the moon remembers you both",2500)}}
  else kI=k===K[0]?1:0;
});

// ===== SW =====
if("serviceWorker"in navigator&&location.protocol!=="file:"){
  window.addEventListener("load",()=>{navigator.serviceWorker.register("./sw.js").catch(()=>{})});
}
