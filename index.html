<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no" />
<meta name="theme-color" content="#0a0005" />
<meta name="color-scheme" content="dark" />
<meta name="referrer" content="no-referrer" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' blob: wss://0.peerjs.com:443 https://0.peerjs.com; font-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" />
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
<title>Moonlight</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon-512.png" />
<style>
:root{
  --bg-0:#050003;
  --ink:#e8e8f0; --ink-dim:#8a8493; --ink-faint:#3a3540;
  --blood:#c0392b; --blood-deep:#8b0000; --blood-glow:#ff2d55;
  --moon:#f5f0e0;
  --glass:rgba(20,5,10,0.6); --glass-edge:rgba(192,57,43,0.3);
  --silver:rgba(232,232,240,0.18);
  --shadow-red:0 0 24px rgba(192,57,43,0.4), 0 8px 32px rgba(0,0,0,0.7);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;background:var(--bg-0);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased}
body{position:fixed;inset:0;overscroll-behavior:none;touch-action:manipulation}
button,input,textarea,select{font:inherit;color:inherit;background:none;border:0;outline:0}
::selection{background:var(--blood);color:#fff}
::-webkit-scrollbar{width:0;height:0}
#embers{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ember{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--moon);box-shadow:0 0 8px var(--blood-glow);opacity:0}
.screen{position:fixed;inset:0;display:none;flex-direction:column;z-index:2}
.screen.on{display:flex}
.center{flex-direction:column;padding:24px;text-align:center;gap:18px;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
h1.title{font-size:28px;margin:0;font-weight:600;letter-spacing:0.5px;background:linear-gradient(135deg,var(--moon),var(--blood-glow));-webkit-background-clip:text;background-clip:text;color:transparent}
h2.subtitle{font-size:18px;margin:0;font-weight:600;color:var(--moon)}
p.sub{color:var(--ink-dim);font-size:13px;margin:0;max-width:340px;line-height:1.5}
input[type=password]{width:100%;max-width:320px;padding:14px 18px;border-radius:16px;background:var(--glass);border:1px solid var(--glass-edge);color:var(--ink);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);font-size:15px;text-align:center}
input[type=password]:focus{border-color:var(--blood);box-shadow:0 0 0 3px rgba(192,57,43,0.18)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 22px;border-radius:16px;background:linear-gradient(135deg,var(--blood-deep),var(--blood));color:#fff;font-weight:700;font-size:14px;letter-spacing:0.5px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);box-shadow:var(--shadow-red);transition:transform .15s,filter .2s;-webkit-user-select:none;user-select:none;width:100%;max-width:320px}
.btn:hover{filter:brightness(1.1)}
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:0.4;cursor:not-allowed;filter:grayscale(0.5)}
.btn.ghost{background:transparent;border:1px solid var(--silver);color:var(--ink);font-weight:500;box-shadow:none;width:auto;padding:8px 14px;font-size:12px}
#moon{filter:drop-shadow(0 0 18px rgba(245,240,224,0.5));width:60px;height:60px;cursor:pointer;transition:transform .4s}
#moon:active{transform:scale(0.95)}
.chat-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(192,57,43,0.12);background:linear-gradient(180deg,rgba(10,0,5,0.9),rgba(10,0,5,0.5));backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);position:relative;z-index:5}
.status-pill{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:999px;background:var(--glass);border:1px solid var(--glass-edge);font-size:11px;color:var(--ink-dim)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ink-faint);transition:background .3s,box-shadow .3s}
.dot.on{background:#5fd47f;box-shadow:0 0 8px #5fd47f}
.dot.wait{background:#f0c14b;animation:pulse 1.4s ease-in-out infinite}
.dot.err{background:#c0392b;box-shadow:0 0 8px #c0392b}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
#messages{flex:1;overflow-y:auto;padding:14px 12px 8px;display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth;position:relative;z-index:2}
.msg{display:flex;flex-direction:column;max-width:78%;animation:pop .25s cubic-bezier(.2,.9,.3,1.2)}
.msg.from-me{align-self:flex-end;align-items:flex-end}
.msg.from-them{align-self:flex-start;align-items:flex-start}
@keyframes pop{from{opacity:0;transform:translateY(6px) scale(0.96)}to{opacity:1;transform:none}}
.bubble{padding:9px 13px;border-radius:18px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);word-wrap:break-word;overflow-wrap:anywhere}
.msg.from-them .bubble{background:var(--glass);border:1px solid var(--silver);color:var(--ink);border-bottom-left-radius:6px}
.msg.from-me .bubble{background:linear-gradient(135deg,rgba(139,0,0,0.85),rgba(192,57,43,0.85));border:1px solid rgba(255,45,85,0.3);color:#fff;border-bottom-right-radius:6px;box-shadow:0 4px 22px rgba(192,57,43,0.4)}
.bubble.img,.bubble.vid{padding:4px;border-radius:18px;overflow:hidden;background:#000}
.bubble.img img,.bubble.vid video{display:block;max-width:100%;max-height:340px;border-radius:13px;cursor:pointer}
.meta-line{font-size:10px;color:var(--ink-faint);margin-top:3px;padding:0 6px}
.read{color:var(--blood-glow);font-weight:700;letter-spacing:1px}
.read.wait{color:var(--ink-faint);font-weight:400}
#composer{padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:linear-gradient(0deg,rgba(5,0,3,0.95),rgba(5,0,3,0.6));border-top:1px solid rgba(192,57,43,0.12);display:flex;gap:8px;align-items:flex-end}
#composer textarea{flex:1;resize:none;min-height:40px;max-height:140px;padding:10px 13px;border-radius:20px;background:var(--glass);border:1px solid var(--silver);color:var(--ink)}
#composer textarea::placeholder{color:var(--ink-faint)}
.send-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--blood-deep),var(--blood));display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;box-shadow:0 0 16px rgba(192,57,43,0.5);transition:transform .15s,filter .2s}
.send-btn:active{transform:scale(0.92)}
.attach{width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-dim)}
.toast{position:fixed;left:50%;bottom:90px;transform:translate(-50%,20px);padding:11px 18px;background:var(--glass);border:1px solid var(--glass-edge);border-radius:999px;color:var(--ink);font-size:13px;backdrop-filter:blur(14px);box-shadow:var(--shadow-red);opacity:0;pointer-events:none;transition:all .25s;z-index:100;max-width:90vw;text-align:center}
.toast.on{opacity:1;transform:translate(-50%,0)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal.on{display:flex}
.modal img,.modal video{max-width:100%;max-height:90vh;border-radius:12px}
.spinner{width:36px;height:36px;border:3px solid rgba(232,232,240,0.15);border-top-color:var(--blood-glow);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media (max-width:480px){h1.title{font-size:22px}}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01s !important;transition-duration:0.01s !important}}
</style>
</head>
<body>

<div id="embers"></div>

<section id="lock" class="screen on">
  <div class="center">
    <div id="moon" role="img" aria-label="moon">
      <svg viewBox="0 0 64 64" width="60" height="60">
        <defs><radialGradient id="mg" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#fffbe8"/><stop offset="60%" stop-color="#f5f0e0"/><stop offset="100%" stop-color="#b8b29a"/></radialGradient></defs>
        <circle cx="32" cy="32" r="30" fill="rgba(245,240,224,0.15)"/>
        <circle cx="32" cy="32" r="22" fill="url(#mg)"/>
        <circle cx="26" cy="26" r="3" fill="#a8a290" opacity="0.55"/>
        <circle cx="38" cy="34" r="2.2" fill="#a8a290" opacity="0.45"/>
        <circle cx="30" cy="40" r="1.8" fill="#a8a290" opacity="0.55"/>
      </svg>
    </div>
    <h1 class="title">Moonlight</h1>
    <p class="sub">"two hearts. one channel. forever."</p>
    <form id="lockForm" style="display:flex;flex-direction:column;gap:10px;align-items:center;width:100%">
      <input type="password" id="pw" placeholder="password" autocomplete="off" />
      <button class="btn" id="enterBtn" type="submit">enter</button>
      <div id="lockErr" style="color:var(--blood-glow);font-size:12px;min-height:16px"></div>
    </form>
  </div>
</section>

<section id="waiting" class="screen">
  <div class="center">
    <div class="spinner"></div>
    <h2 class="subtitle" id="waitingTitle">looking for her</h2>
    <p class="sub" id="waitingHint">ask her to open this same URL on her phone. we'll find each other.</p>
    <p class="sub" id="waitingDetail" style="font-size:11px;opacity:0.5"></p>
  </div>
</section>

<section id="chat" class="screen">
  <header class="chat-head">
    <div class="status-pill"><span class="dot on" id="chatDot"></span><span id="chatStatus">connected</span></div>
    <button class="btn ghost" id="exitBtn">exit</button>
  </header>
  <div id="messages"></div>
  <div id="composer">
    <label class="attach" for="fileInput">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.4 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
    </label>
    <input type="file" id="fileInput" accept="image/*,video/*" hidden />
    <textarea id="msgInput" placeholder="breathe in… type…" rows="1" maxlength="20000"></textarea>
    <button class="send-btn" id="sendBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.97 11.12l8.51-8.5a.75.75 0 0 1 1.06 0l8.5 8.5a.75.75 0 0 1-.99 1.13L13.5 5.7v13.55a.75.75 0 0 1-1.5 0V5.7l-6.57 6.55a.75.75 0 1 1-.99-1.13z"/></svg>
    </button>
  </div>
</section>

<div id="mediaModal" class="modal"><div id="mediaWrap"></div></div>
<div id="toast" class="toast"></div>

<script>
"use strict";
// ===========================================================
// MOONLIGHT v7 — no codes, no copy-paste. just wait.
// Architecture:
//   - All peers connect to the SAME known room on PeerJS broker.
//   - Whichever phone loads first registers as "host" (waiting).
//   - The other phone joins as "guest" and we auto-negotiate.
//   - Chat opens automatically when the data channel opens.
//   - If broker is unreachable, app polls every 3s and shows
//     "still looking" forever — no error, no manual anything.
// ===========================================================

const $=s=>document.querySelector(s);
const enc=new TextEncoder(),dec=new TextDecoder();
const rand=n=>{const a=new Uint8Array(n);crypto.getRandomValues(a);return a};
const IDshort=()=>Array.from(rand(8)).map(x=>x.toString(16).padStart(2,"0")).join("").slice(0,10);
const b64=a=>{let s="";for(let i=0;i<a.length;i++)s+=String.fromCharCode(a[i]);return btoa(s)};
const unb64=s=>{const a=atob(s);const o=new Uint8Array(a.length);for(let i=0;i<a.length;i++)o[i]=a.charCodeAt(i);return o};
const toast=(m,t)=>{const e=$("#toast");e.textContent=m;e.classList.add("on");clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove("on"),t||2400)};
function screen(n){["lock","waiting","chat"].forEach(x=>$("#"+x).classList.remove("on"));$("#"+n).classList.add("on");}
function waitIce(pc){
  // Use candidates as soon as we have any. Don't wait for STUN.
  return new Promise(r=>{
    if(pc.iceGatheringState==="complete")return r();
    let done=false;
    const finish=()=>{if(done)return;done=true;clearTimeout(t);r()};
    const t=setTimeout(finish,2500);
    pc.onicegatheringstatechange=()=>{if(pc.iceGatheringState==="complete")finish()};
  });
}

async function deriveKey(pw,salt){
  const baseKey=await crypto.subtle.importKey("raw",enc.encode(pw),{name:"PBKDF2"},false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:310000,hash:"SHA-256"},baseKey,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
}
async function encrypt(obj,key){
  const iv=rand(12);
  const data=enc.encode(typeof obj==="string"?obj:JSON.stringify(obj));
  const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,data);
  return {iv:b64(new Uint8Array(iv)),ct:b64(new Uint8Array(ct))};
}
async function decrypt(o,key){
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:unb64(o.iv)},key,unb64(o.ct));
  try{return JSON.parse(dec.decode(pt))}catch{return dec.decode(pt)}
}

let DB=null;
const DBN="moon_v7",META="meta",MSG="msg";
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DBN,1);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(META))d.createObjectStore(META,{keyPath:"k"});if(!d.objectStoreNames.contains(MSG))d.createObjectStore(MSG,{keyPath:"id"})};r.onsuccess=()=>{DB=r.result;res()};r.onerror=()=>rej(r.error)})}
const dbGet=(s,k)=>new Promise(r=>{const t=DB.transaction(s,"readonly");const g=t.objectStore(s).get(k);g.onsuccess=()=>r(g.result)});
const dbPut=(s,v)=>new Promise(r=>{const t=DB.transaction(s,"readwrite");t.objectStore(s).put(v);t.oncomplete=r});
const dbAll=(s)=>new Promise(r=>{const t=DB.transaction(s,"readonly");const g=t.objectStore(s).getAll();g.onsuccess=()=>r(g.result)});

const S={key:null,pc:null,dc:null,role:null,peer:null};

function spawnEmber(){
  const e=document.createElement("div");e.className="ember";
  e.style.left=(Math.random()*100)+"vw";
  const dur=8+Math.random()*10;const drift=(Math.random()-0.5)*60;
  e.animate([{transform:"translateY(110vh) translateX(0)",opacity:0},{transform:`translateY(-10vh) translateX(${drift}px) scale(1)`,opacity:1,offset:.1},{transform:`translateY(-30vh) translateX(${drift*1.4}px) scale(0.3)`,opacity:0}],{duration:dur*1000,easing:"linear"}).onfinish=()=>e.remove();
  $("#embers").appendChild(e);
}
setInterval(spawnEmber,650);

// ===========================================================
// LOCK
// ===========================================================
$("#lockForm").addEventListener("submit",async e=>{
  e.preventDefault();
  const pw=$("#pw").value;
  if(!pw||pw.length<3){$("#lockErr").textContent="password required";return}
  $("#enterBtn").disabled=true;$("#lockErr").textContent="";
  try{
    await openDB();
    let saltMeta=await dbGet(META,"salt");
    let salt;
    if(saltMeta&&saltMeta.v){
      salt=new Uint8Array(saltMeta.v);
      S.key=await deriveKey(pw,salt);
      const canary=await dbGet(META,"canary");
      if(canary){
        try{const ok=await decrypt({iv:canary.v.iv,ct:canary.v.ct},S.key);if(ok!=="ok")throw 0}
        catch{$("#lockErr").textContent="wrong password";$("#enterBtn").disabled=false;S.key=null;return}
      }
    }else{
      salt=rand(16);
      S.key=await deriveKey(pw,salt);
      const c=await encrypt("ok",S.key);
      await dbPut(META,{k:"salt",v:Array.from(salt)});
      await dbPut(META,{k:"canary",v:c});
    }
    S.key=await deriveKey(pw,salt);
    await startConnect();
  }catch(err){
    console.error(err);$("#lockErr").textContent="error: "+err.message;
  }
  $("#enterBtn").disabled=false;
});

// ===========================================================
// CONNECT — one PeerJS room, one signaling protocol.
// We use HTTP polling (not WebSocket) so networks blocking WSS upgrades still work.
// ===========================================================
async function startConnect(){
  screen("waiting");
  $("#waitingTitle").textContent="looking for her";
  $("#waitingHint").textContent="ask her to open this same URL on her phone.";
  $("#waitingDetail").textContent="";

  const myId="m-"+IDshort();
  // Try to connect to peerjs public broker via HTTP polling.
  // One phone becomes host, the other becomes guest, automatically.
  // Strategy: assume HOST first. If we see another peer connecting to us,
  // we negotiate with them. If we detect that someone else is already the host,
  // we become the guest instead.

  let pc=null;
  let dc=null;
  let stopped=false;
  let foundPeer=null;

  function setStatus(t,cls){
    $("#waitingDetail").textContent=t;
  }

  function makeOffer(){
    const npc=new RTCPeerConnection({iceServers:[]});
    const ndc=npc.createDataChannel("moon",{ordered:true});
    pc=npc;dc=ndc;S.pc=npc;S.dc=ndc;
    wireDC(ndc);
    npc.onicecandidate=()=>{};
    return npc.createOffer().then(o=>npc.setLocalDescription(o)).then(()=>waitIce(npc)).then(()=>{
      return {pc:npc,sdp:npc.localDescription};
    });
  }
  function acceptOffer(offerSdp){
    // I am guest
    const npc=new RTCPeerConnection({iceServers:[]});
    pc=npc;S.pc=npc;
    npc.ondatachannel=ev=>{dc=ev.channel;S.dc=dc;wireDC(dc)};
    npc.onicecandidate=()=>{};
    return npc.setRemoteDescription(new RTCSessionDescription(offerSdp)).then(()=>npc.createAnswer()).then(a=>npc.setLocalDescription(a)).then(()=>waitIce(npc)).then(()=>{
      return {pc:npc,sdp:npc.localDescription};
    });
  }
  function completeWithAnswer(answerSdp){
    return pc.setRemoteDescription(new RTCSessionDescription(answerSdp));
  }

  function wireDC(d){
    d.onopen=()=>{
      stopped=true;
      enterChat();
    };
    d.onmessage=async ev=>{
      let data;try{data=JSON.parse(ev.data)}catch{return};
      if(data.t==="m"){
        try{const m=await decrypt({iv:data.iv,ct:data.ct},S.key);renderMsg(m,"them")}catch(e){console.warn("decrypt fail",e)}
      }else if(data.t==="read"){markRead(data.id)}
    };
    d.onclose=()=>{S.dc=null};
  }

  // ===== HTTP polling signaling (PeerJS protocol) =====
  const base="https://0.peerjs.com";
  let brokerUp=false;
  const seen=new Set();

  async function poll(){
    if(stopped)return;
    try{
      const url=base+"/peerjs/id/"+myId+(foundPeer?"/"+foundPeer+"/all":"")+"?ts="+Date.now()+"&r="+Math.random();
      const r=await fetch(url,{cache:"no-store"});
      if(r.ok){
        brokerUp=true;
        const j=await r.json();
        const msgs=Array.isArray(j)?j:(j&&j.messages)||[];
        for(const m of msgs){
          const sigId=m.ts+"_"+(m.src||"x")+(m.dst||"x")+(m.type||"")+JSON.stringify(m.payload).slice(0,40);
          if(seen.has(sigId))continue;
          seen.add(sigId);
          if(seen.size>200)seen=new Set([...seen].slice(-100));
          await onSignal(m);
        }
      }else{
        brokerUp=false;
      }
    }catch(e){
      brokerUp=false;
    }
    if(!stopped)setTimeout(poll,brokerUp?2500:3000);
  }

  async function sendSignal(to,type,payload){
    if(!brokerUp)return;
    try{
      await fetch(base+"/peerjs/id/"+myId+"/"+to+"/"+type+"?ts="+Date.now(),{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({type,dst:to,src:myId,payload})
      });
    }catch(e){}
  }

  async function onSignal(m){
    if(m.type==="hello"&&m.src&&m.src!==myId&&!foundPeer){
      // Someone announced themselves. If I'm host, send them offer.
      // If I'm not yet host, become guest and respond to them.
      foundPeer=m.src;
      setStatus("found each other…","wait");
      // I'll create the offer. They'll answer.
      const {sdp}=await makeOffer();
      await sendSignal(foundPeer,"offer",sdp);
    }else if(m.type==="offer"&&!pc){
      // They sent an offer. I am guest.
      foundPeer=m.src;
      setStatus("received invite…","wait");
      const {sdp}=await acceptOffer(m.payload);
      await sendSignal(foundPeer,"answer",sdp);
    }else if(m.type==="answer"&&pc){
      await completeWithAnswer(m.payload);
    }else if(m.type==="candidate"&&pc){
      try{await pc.addIceCandidate(new RTCIceCandidate(m.payload))}catch(e){}
    }
  }

  // Start as host: announce our presence. Any peer that sees this will respond.
  async function announce(){
    if(stopped||foundPeer)return;
    try{
      await fetch(base+"/peerjs/id/"+myId+"/broadcast/hello?ts="+Date.now(),{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({type:"hello",src:myId,payload:{}})
      });
    }catch(e){}
  }

  // initial sequence
  setStatus("listening…","wait");
  announce();
  setInterval(announce,5000); // re-announce every 5s
  poll();
}

// ===========================================================
// CHAT
// ===========================================================
async function saveMsg(m){const c=await encrypt(m,S.key);await dbPut(MSG,{id:m.id,iv:c.iv,ct:c.ct,ts:m.ts,from:m.from})}
async function loadMsg(){
  const all=await dbAll(MSG);const out=[];
  for(const r of all){try{const m=await decrypt({iv:r.iv,ct:r.ct},S.key);out.push({...m,id:r.id,ts:r.ts})}catch{}}
  return out.sort((a,b)=>a.ts-b.ts);
}
$("#msgInput").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}});
$("#msgInput").addEventListener("input",()=>{const t=$("#msgInput");t.style.height="auto";t.style.height=Math.min(140,t.scrollHeight)+"px"});
$("#sendBtn").addEventListener("click",send);
$("#fileInput").addEventListener("change",async e=>{
  const f=e.target.files[0];if(!f)return;
  if(f.size>100*1024*1024){toast("too big — max 100mb");e.target.value="";return}
  const r=new FileReader();
  r.onload=async()=>{
    const isV=f.type.startsWith("video/"),isI=f.type.startsWith("image/");
    if(!isV&&!isI){toast("images or videos only");return}
    const m={id:IDshort(),type:isV?"video":"image",dataUrl:r.result,ts:Date.now(),from:"me",fileName:f.name,fileSize:f.size};
    await saveMsg(m);renderMsg(m,"me");sendWire(m);
  };
  r.readAsDataURL(f);e.target.value="";
});
async function send(){
  const txt=$("#msgInput").value.trim();if(!txt)return;
  $("#msgInput").value="";$("#msgInput").style.height="auto";
  const m={id:IDshort(),type:"text",text:txt,ts:Date.now(),from:"me"};
  await saveMsg(m);renderMsg(m,"me");sendWire(m);
}
async function sendWire(m){
  if(!S.dc||S.dc.readyState!=="open"){toast("not connected yet");return}
  const c=await encrypt(m,S.key);
  try{S.dc.send(JSON.stringify({t:"m",iv:c.iv,ct:c.ct,id:m.id,ts:m.ts}))}catch(e){toast("send fail")}
}
function renderMsg(m,who){
  const list=$("#messages");
  const d=document.createElement("div");d.className="msg from-"+who;d.dataset.id=m.id;
  const b=document.createElement("div");b.className="bubble";
  if(m.type==="image"){b.classList.add("img");const i=document.createElement("img");i.src=m.dataUrl;i.onclick=()=>openMedia("img",m.dataUrl);b.appendChild(i)}
  else if(m.type==="video"){b.classList.add("vid");const v=document.createElement("video");v.src=m.dataUrl;v.controls=true;b.appendChild(v)}
  else{b.textContent=m.text}
  d.appendChild(b);
  const ml=document.createElement("div");ml.className="meta-line";
  const t=new Date(m.ts);const hh=String(t.getHours()).padStart(2,"0"),mm=String(t.getMinutes()).padStart(2,"0");
  ml.innerHTML=`<span>${hh}:${mm}</span>`+(who==="me"?`<span class="read wait" data-rid="${m.id}">sent</span>`:"");
  d.appendChild(ml);list.appendChild(d);
  $("#messages").scrollTo({top:9e9,behavior:"smooth"});
}
function markRead(id){const e=document.querySelector(`[data-rid="${id}"]`);if(e){e.classList.remove("wait");e.classList.add("read");e.textContent="read"}}
function openMedia(k,u){const w=$("#mediaWrap");w.innerHTML="";const e=k==="img"?document.createElement("img"):document.createElement("video");e.src=u;if(k!=="img")e.controls=true;w.appendChild(e);$("#mediaModal").classList.add("on")}
$("#mediaModal").addEventListener("click",()=>$("#mediaModal").classList.remove("on"));
async function enterChat(){
  screen("chat");
  const msgs=await loadMsg();
  const list=$("#messages");list.innerHTML="";
  for(const m of msgs)renderMsg(m,m.from==="me"?"me":"them");
  $("#messages").scrollTo({top:9e9});
}
$("#exitBtn").addEventListener("click",()=>{
  if(confirm("exit?")){
    if(S.dc)try{S.dc.close()}catch(e){};
    if(S.pc)try{S.pc.close()}catch(e){};
    screen("lock");$("#pw").value="";
  }
});

// ===== MOON TRIPLE TAP = PANIC =====
let moonTaps=0,moonT=0;
$("#moon").addEventListener("click",()=>{
  moonTaps++;clearTimeout(moonT);
  moonT=setTimeout(()=>{moonTaps=0},800);
  if(moonTaps>=3){
    moonTaps=0;
    if(confirm("WIPE everything? cannot undo.")){
      try{indexedDB.deleteDatabase(DBN)}catch(e){}
      setTimeout(()=>location.href=location.origin+location.pathname,300);
    }
  }
});

// ===== KONAMI =====
const K=["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowLeft","ArrowRight","ArrowLeft","ArrowRight","b","a"];
let kI=0;
window.addEventListener("keydown",e=>{
  const k=e.key.length===1?e.key.toLowerCase():e.key;
  if(k===K[kI]){kI++;if(kI===K.length){kI=0;for(let i=0;i<40;i++)setTimeout(spawnEmber,i*30);toast("🌙 the moon remembers you both",2500)}}
  else kI=k===K[0]?1:0;
});

if("serviceWorker"in navigator&&location.protocol!=="file:"){
  window.addEventListener("load",()=>{navigator.serviceWorker.register("./sw.js").catch(()=>{})});
}
