<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no" />
<meta name="theme-color" content="#0a0005" />
<meta name="color-scheme" content="dark" />
<meta name="referrer" content="no-referrer" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' blob: wss://0.peerjs.com:443 https://0.peerjs.com wss://*.skyway.io https://*.skyway.io wss://echo.websocket.events https://echo.websocket.events; font-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" />
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
<title>Moonlight</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon-512.png" />
<style>
:root{
  --bg-0:#050003; --bg-1:#0a0005; --bg-2:#150008;
  --ink:#e8e8f0; --ink-dim:#8a8493; --ink-faint:#3a3540;
  --blood:#c0392b; --blood-deep:#8b0000; --blood-glow:#ff2d55;
  --moon:#f5f0e0; --moon-shadow:#b8b29a;
  --glass:rgba(20,5,10,0.55); --glass-edge:rgba(192,57,43,0.25);
  --silver:rgba(232,232,240,0.08); --silver-edge:rgba(232,232,240,0.18);
  --r:14px; --r-sm:10px; --r-lg:22px;
  --shadow-red:0 0 24px rgba(192,57,43,0.35), 0 8px 32px rgba(0,0,0,0.6);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;background:var(--bg-0);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased}
body{position:fixed;inset:0;overscroll-behavior:none;touch-action:manipulation}
button,input,textarea,select{font:inherit;color:inherit;background:none;border:0;outline:0}
::selection{background:var(--blood);color:#fff}
::-webkit-scrollbar{width:0;height:0}

#embers{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ember{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--moon);box-shadow:0 0 8px var(--blood-glow);opacity:0;will-change:transform,opacity}

.screen{position:fixed;inset:0;display:none;flex-direction:column;z-index:2}
.screen.on{display:flex}
.center{display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px;text-align:center;gap:18px;width:100%;height:100%}

h1.title{font-size:32px;margin:0;font-weight:600;letter-spacing:0.5px;background:linear-gradient(135deg,var(--moon),var(--blood-glow));-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{color:var(--ink-dim);font-size:14px;margin:0;max-width:340px;line-height:1.5}
.link-box{background:var(--glass);border:1px solid var(--glass-edge);border-radius:var(--r);padding:12px 14px;word-break:break-all;font-family:ui-monospace,monospace;font-size:11px;color:var(--ink-dim);max-width:340px;width:100%;line-height:1.4;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:16px 28px;border-radius:18px;background:linear-gradient(135deg,var(--blood-deep),var(--blood));color:#fff;font-weight:700;font-size:15px;letter-spacing:0.5px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);box-shadow:var(--shadow-red);transition:transform .15s,box-shadow .2s,filter .2s;-webkit-user-select:none;user-select:none;width:100%;max-width:340px}
.btn:hover{filter:brightness(1.1)}
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:0.4;cursor:not-allowed;filter:grayscale(0.5)}
.btn.ghost{background:transparent;border:1px solid var(--silver-edge);color:var(--ink);font-weight:500;box-shadow:none}
.btn.ghost:hover{background:var(--silver);border-color:var(--blood)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%;max-width:340px}

input[type=password]{width:100%;max-width:340px;padding:16px 18px;border-radius:18px;background:var(--glass);border:1px solid var(--glass-edge);color:var(--ink);letter-spacing:0.5px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);font-size:15px;text-align:center}
input[type=password]:focus{border-color:var(--blood);box-shadow:0 0 0 3px rgba(192,57,43,0.18)}

#moon{filter:drop-shadow(0 0 18px rgba(245,240,224,0.5));width:64px;height:64px;cursor:pointer;transition:transform .4s}
#moon:active{transform:scale(0.95)}

.chat-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid rgba(192,57,43,0.12);background:linear-gradient(180deg,rgba(10,0,5,0.85),rgba(10,0,5,0.5));backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);position:relative;z-index:5}
.status-pill{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;background:var(--glass);border:1px solid var(--glass-edge);font-size:12px;color:var(--ink-dim)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ink-faint);transition:background .3s,box-shadow .3s}
.dot.on{background:#5fd47f;box-shadow:0 0 8px #5fd47f}
.dot.wait{background:#f0c14b;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

#messages{flex:1;overflow-y:auto;padding:18px 16px 8px;display:flex;flex-direction:column;gap:7px;scroll-behavior:smooth;position:relative;z-index:2}
.msg{display:flex;flex-direction:column;max-width:78%;animation:pop .25s cubic-bezier(.2,.9,.3,1.2)}
.msg.from-me{align-self:flex-end;align-items:flex-end}
.msg.from-them{align-self:flex-start;align-items:flex-start}
@keyframes pop{from{opacity:0;transform:translateY(6px) scale(0.96)}to{opacity:1;transform:none}}
.bubble{padding:10px 14px;border-radius:18px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);word-wrap:break-word;overflow-wrap:anywhere}
.msg.from-them .bubble{background:var(--glass);border:1px solid var(--silver-edge);color:var(--ink);border-bottom-left-radius:6px}
.msg.from-me .bubble{background:linear-gradient(135deg,rgba(139,0,0,0.85),rgba(192,57,43,0.85));border:1px solid rgba(255,45,85,0.3);color:#fff;border-bottom-right-radius:6px;box-shadow:0 4px 22px rgba(192,57,43,0.4)}
.bubble.img,.bubble.vid{padding:5px;border-radius:18px;overflow:hidden;background:#000}
.bubble.img img,.bubble.vid video{display:block;max-width:100%;max-height:340px;border-radius:13px;cursor:pointer}
.meta-line{font-size:10px;color:var(--ink-faint);margin-top:3px;padding:0 6px}
.read{color:var(--blood-glow);font-weight:700;letter-spacing:1px}
.read.wait{color:var(--ink-faint);font-weight:400}

#composer{padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:linear-gradient(0deg,rgba(5,0,3,0.95),rgba(5,0,3,0.6));border-top:1px solid rgba(192,57,43,0.12);display:flex;gap:8px;align-items:flex-end}
#composer textarea{flex:1;resize:none;min-height:42px;max-height:140px;padding:11px 14px;border-radius:22px;background:var(--glass);border:1px solid var(--silver-edge);color:var(--ink)}
#composer textarea::placeholder{color:var(--ink-faint)}
.send-btn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--blood-deep),var(--blood));display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;box-shadow:0 0 18px rgba(192,57,43,0.5);transition:transform .15s,filter .2s}
.send-btn:active{transform:scale(0.92)}
.attach{width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-dim)}

.toast{position:fixed;left:50%;bottom:90px;transform:translate(-50%,20px);padding:11px 18px;background:var(--glass);border:1px solid var(--glass-edge);border-radius:999px;color:var(--ink);font-size:13px;backdrop-filter:blur(14px);box-shadow:var(--shadow-red);opacity:0;pointer-events:none;transition:all .25s;z-index:100;max-width:90vw;text-align:center}
.toast.on{opacity:1;transform:translate(-50%,0)}

.modal{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal.on{display:flex}
.modal img,.modal video{max-width:100%;max-height:90vh;border-radius:12px}

.qr-wrap{display:flex;justify-content:center;padding:14px;background:#fff;border-radius:18px;width:200px;height:200px}
.qr-wrap canvas{width:100%;height:100%}

@media (max-width:480px){h1.title{font-size:26px}}

@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01s !important;transition-duration:0.01s !important}}
</style>
</head>
<body>

<div id="embers"></div>

<!-- ===== LOCK ===== -->
<section id="lock" class="screen on">
  <div class="center">
    <div id="moon" role="img" aria-label="moon">
      <svg viewBox="0 0 64 64" width="64" height="64">
        <defs>
          <radialGradient id="mg" cx="35%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#fffbe8"/>
            <stop offset="60%" stop-color="#f5f0e0"/>
            <stop offset="100%" stop-color="#b8b29a"/>
          </radialGradient>
        </defs>
        <circle cx="32" cy="32" r="30" fill="rgba(245,240,224,0.15)"/>
        <circle cx="32" cy="32" r="22" fill="url(#mg)"/>
        <circle cx="26" cy="26" r="3" fill="#a8a290" opacity="0.55"/>
        <circle cx="38" cy="34" r="2.2" fill="#a8a290" opacity="0.45"/>
        <circle cx="30" cy="40" r="1.8" fill="#a8a290" opacity="0.55"/>
      </svg>
    </div>
    <h1 class="title">Moonlight</h1>
    <p class="sub">"two hearts. one channel. forever."</p>
    <form id="lockForm" style="display:flex;flex-direction:column;gap:12px;align-items:center;width:100%">
      <input type="password" id="pw" placeholder="password" autocomplete="off" />
      <button class="btn" id="enterBtn" type="submit">enter</button>
      <div id="lockErr" style="color:var(--blood-glow);font-size:12px;min-height:16px"></div>
    </form>
  </div>
</section>

<!-- ===== READY ===== -->
<section id="ready" class="screen">
  <div class="center">
    <h1 class="title" style="font-size:22px">ready</h1>
    <p class="sub" id="readyText">creating your private channel…</p>
    <div id="readyActions" style="display:flex;flex-direction:column;gap:12px;align-items:center;width:100%;max-width:340px">
      <div id="shareLinkBox" class="link-box" style="display:none"></div>
      <button class="btn" id="shareLinkBtn" style="display:none">copy invite link</button>
      <div id="qrBox" class="qr-wrap" style="display:none"></div>
      <div id="shareInfo" style="color:var(--ink-dim);font-size:12px;display:none">
        send this to her. tap once = paired. forever.
      </div>
    </div>
    <div id="statusBox" class="status-pill" style="display:none">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">offline</span>
    </div>
  </div>
</section>

<!-- ===== CHAT ===== -->
<section id="chat" class="screen">
  <header class="chat-head">
    <div class="status-pill"><span class="dot on" id="chatDot"></span><span id="chatStatus">connected</span></div>
    <button class="btn ghost" id="exitBtn" style="padding:6px 14px;font-size:12px;width:auto">exit</button>
  </header>
  <div id="messages"></div>
  <div id="composer">
    <label class="attach" for="fileInput">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.4 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
    </label>
    <input type="file" id="fileInput" accept="image/*,video/*" hidden />
    <textarea id="msgInput" placeholder="breathe in… type…" rows="1" maxlength="20000"></textarea>
    <button class="send-btn" id="sendBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.97 11.12l8.51-8.5a.75.75 0 0 1 1.06 0l8.5 8.5a.75.75 0 0 1-.99 1.13L13.5 5.7v13.55a.75.75 0 0 1-1.5 0V5.7l-6.57 6.55a.75.75 0 1 1-.99-1.13z"/></svg>
    </button>
  </div>
</section>

<!-- ===== MODAL ===== -->
<div id="mediaModal" class="modal"><div id="mediaWrap"></div></div>

<!-- ===== TOAST ===== -->
<div id="toast" class="toast"></div>

<script>
"use strict";

// ===== EMBER PARTICLES (decorative) =====
function spawnEmber(){
  const e=document.createElement("div");e.className="ember";
  e.style.left=(Math.random()*100)+"vw";
  const dur=8+Math.random()*10;const drift=(Math.random()-0.5)*60;
  e.animate([{transform:"translateY(110vh) translateX(0)",opacity:0},{transform:`translateY(-10vh) translateX(${drift}px) scale(1)`,opacity:1,offset:.1},{transform:`translateY(-30vh) translateX(${drift*1.4}px) scale(0.3)`,opacity:0}],{duration:dur*1000,easing:"linear"}).onfinish=()=>e.remove();
  $("#embers").appendChild(e);
}
setInterval(spawnEmber,650);

// ===== UTILS =====
const $=s=>document.querySelector(s);
const enc=new TextEncoder(),dec=new TextDecoder();
const rand=n=>{const a=new Uint8Array(n);crypto.getRandomValues(a);return a};
const toast=(m,t)=>{const e=$("#toast");e.textContent=m;e.classList.add("on");clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove("on"),t||2400)};
function screen(n){["lock","ready","chat"].forEach(x=>$("#"+x).classList.remove("on"));$("#"+n).classList.add("on");}

// ===== CRYPTO =====
async function deriveKey(pw,salt){
  const baseKey=await crypto.subtle.importKey("raw",enc.encode(pw),{name:"PBKDF2"},false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:310000,hash:"SHA-256"},baseKey,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
}
async function encrypt(obj,key){
  const iv=rand(12);
  const data=enc.encode(typeof obj==="string"?obj:JSON.stringify(obj));
  const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,data);
  return {iv:bufB64(iv),ct:bufB64(ct)};
}
async function decrypt(o,key){
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64Buf(o.iv)},key,b64Buf(o.ct));
  try{return JSON.parse(dec.decode(pt))}catch{return dec.decode(pt)}
}
const bufB64=b=>{const a=new Uint8Array(b);let s="";for(let i=0;i<a.length;i++)s+=String.fromCharCode(a[i]);return btoa(s)};
const b64Buf=s=>{const a=atob(s);const o=new Uint8Array(a.length);for(let i=0;i<a.length;i++)o[i]=a.charCodeAt(i);return o};

// ===== STORAGE =====
let DB=null;
const DB_NAME="moon",META="meta",MSG="msg",CFG="cfg";
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(META))d.createObjectStore(META,{keyPath:"k"});if(!d.objectStoreNames.contains(MSG))d.createObjectStore(MSG,{keyPath:"id"});if(!d.objectStoreNames.contains(CFG))d.createObjectStore(CFG,{keyPath:"k"})};r.onsuccess=()=>{DB=r.result;res()};r.onerror=()=>rej(r.error)})}
const dbGet=(s,k)=>new Promise(r=>{const t=DB.transaction(s,"readonly"),g=t.objectStore(s).get(k);g.onsuccess=()=>r(g.result)});
const dbPut=(s,v)=>new Promise(r=>{const t=DB.transaction(s,"readwrite");t.objectStore(s).put(v);t.oncomplete=r});
const dbAll=(s)=>new Promise(r=>{const t=DB.transaction(s,"readonly");const g=t.objectStore(s).getAll();g.onsuccess=()=>r(g.result)});
const dbClear=(s)=>new Promise(r=>{const t=DB.transaction(s,"readwrite");t.objectStore(s).clear();t.oncomplete=r});

// ===== STATE =====
const S={key:null,salt:null,role:null,peer:null,conn:null};
let me={pair:null};
let offlineQueue=[];

// ===== LOCK =====
$("#lockForm").addEventListener("submit",async e=>{
  e.preventDefault();
  const pw=$("#pw").value;
  if(!pw||pw.length<3){$("#lockErr").textContent="password required";return}
  $("#enterBtn").disabled=true;$("#lockErr").textContent="";
  try{
    await openDB();
    let saltMeta=await dbGet(META,"salt");
    let salt;
    if(saltMeta&&saltMeta.v){
      salt=new Uint8Array(saltMeta.v);
      S.key=await deriveKey(pw,salt);
      const canary=await dbGet(META,"canary");
      if(canary){
        try{const ok=await decrypt({iv:canary.v.iv,ct:canary.v.ct},S.key);if(ok!=="ok")throw 0}
        catch{$("#lockErr").textContent="wrong password";$("#enterBtn").disabled=false;S.key=null;return}
      }
    }else{
      salt=rand(16);
      S.key=await deriveKey(pw,salt);
      const c=await encrypt("ok",S.key);
      await dbPut(META,{k:"salt",v:Array.from(salt)});
      await dbPut(META,{k:"canary",v:c});
    }
    S.key=await deriveKey(pw,salt);  // refresh handle
    me.pair=await dbGet(CFG,"pair");
    // CHECK URL FOR INVITE LINK
    const hash=location.hash.replace(/^#/,"");
    if(hash.startsWith("invite=")){
      const inviteRaw=decodeURIComponent(hash.slice(7));
      try{
        const invite=JSON.parse(dec.decode(b64Buf(inviteRaw)));
        if(invite&&invite.hostId&&invite.ts>Date.now()-1000*60*60*24*7){
          toast("joining…");
          // i am guest
          await guestFlow(invite);
          return;
        }
      }catch(err){console.warn("bad invite",err)}
    }
    // else: host or returning user
    await hostFlow();
  }catch(err){
    console.error(err);$("#lockErr").textContent="error: "+err.message;
  }
  $("#enterBtn").disabled=false;
});

// ===== HOST FLOW =====
async function hostFlow(){
  if(me.pair&&me.pair.v&&me.pair.v.peerId&&me.pair.v.myId){
    // already paired — try silent reconnect
    screen("ready");
    $("#readyText").textContent="connecting…";
    await tryReconnect();
    return;
  }
  // first time — generate my device id + pair token
  const myId="ml-"+rand(20).reduce((s,x)=>s+x.toString(16).padStart(2,"0"),"").slice(0,16);
  const pairCode=btoa(String.fromCharCode(...rand(8))).replace(/[^A-Z0-9]/gi,"").slice(0,8).toUpperCase();
  me.pair={k:"pair",v:{myId,peerId:null,pairCode,createdAt:Date.now(),got:false}};
  await dbPut(CFG,me.pair);
  // build invite link
  const invitePayload={hostId:myId,pairCode,ts:Date.now()};
  const inviteB64=bufB64(enc.encode(JSON.stringify(invitePayload)));
  const inviteURL=location.origin+location.pathname+"#invite="+encodeURIComponent(inviteB64);
  screen("ready");
  $("#readyText").textContent="send this link to her. one time only.";
  $("#shareLinkBox").style.display="block";$("#shareLinkBox").textContent=inviteURL;
  $("#shareLinkBtn").style.display="block";
  $("#qrBox").style.display="flex";
  renderQR($("#qrBox"),inviteURL);
  $("#shareInfo").style.display="block";
  $("#shareLinkBtn").onclick=async()=>{
    try{
      await navigator.clipboard.writeText(inviteURL);
      toast("copied! send it to her");
    }catch(e){
      // fallback select text
      const r=document.createRange();r.selectNodeContents($("#shareLinkBox"));
      const s=getSelection();s.removeAllRanges();s.addRange(r);
      toast("long-press the box to copy");
    }
  };
  // poll IndexedDB for guest connection
  pollGuest();
  // also try broker after 2s
  setTimeout(()=>tryBrokerHost(),1500);
}

// ===== GUEST FLOW =====
async function guestFlow(invite){
  // generate my id, save pair, try connecting
  const myId="ml-"+rand(20).reduce((s,x)=>s+x.toString(16).padStart(2,"0"),"").slice(0,16);
  await dbPut(CFG,{k:"pair",v:{myId,peerId:invite.hostId,role:"guest",invite}});
  me.pair={k:"pair",v:{myId,peerId:invite.hostId}};
  screen("ready");
  $("#readyText").textContent="connecting you two…";
  // attempt brokers in order
  await tryBrokerPair(myId,invite.hostId,"guest");
}

// ===== RECONNECT =====
async function tryReconnect(){
  if(!me.pair||!me.pair.v||!me.pair.v.peerId){
    await hostFlow();return;
  }
  await tryBrokerPair(me.pair.v.myId,me.pair.v.peerId,me.pair.v.role||"host");
}

// ===== BROKER ATTEMPT =====
const BROKERS=["0.peerjs.com","skyway.io","echo.websocket.events"];
async function tryBrokerPair(myId,peerId,role){
  $("#statusBox").style.display="flex";$("#statusDot").className="dot wait";$("#statusText").textContent="finding a path…";
  for(let i=0;i<BROKERS.length;i++){
    const host=BROKERS[i];
    setStatus(`trying ${host}…`);
    const ok=await tryOneBroker(host,myId,peerId,role);
    if(ok)return true;
  }
  setStatus("offline");
  $("#statusDot").className="dot";
  toast("no path found — try WiFi off → on");
  return false;
}
function setStatus(t){$("#statusText").textContent=t}

async function tryOneBroker(host,myId,peerId,role){
  return new Promise(resolve=>{
    let ws,connected=false,got=false,resolved=false;
    const done=v=>{if(resolved)return;resolved=true;clearTimeout(timer);try{ws&&ws.close()}catch(e){};resolve(v)};
    const path="/peerjs";
    const url="wss://"+host+":443"+path+"/"+myId+"?ts="+Date.now()+"&token="+Math.random().toString(36).slice(2);
    try{ws=new WebSocket(url)}catch(e){done(false);return}
    const timer=setTimeout(()=>{if(!connected)done(false)},10000);
    ws.onopen=()=>{
      connected=true;
      // connect to peer
      ws.send(JSON.stringify({src:myId,dst:peerId,type:"open"}));
    };
    ws.onmessage=async e=>{
      const t=(typeof e.data==="string")?e.data:"";
      let m;try{m=JSON.parse(t)}catch{return};
      if(m.type==="offer"){
        // answer
        const pc=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
        pc.ondatachannel=ev=>{setupDC(ev.channel);};
        ws._pc=pc;
        await pc.setRemoteDescription(new RTCSessionDescription(m.payload));
        const ans=await pc.createAnswer();await pc.setLocalDescription(ans);
        ws.send(JSON.stringify({src:myId,dst:m.src,type:"answer",payload:ans}));
      }else if(m.type==="answer"){
        if(ws._pc)await ws._pc.setRemoteDescription(new RTCSessionDescription(m.payload));
      }else if(m.type==="candidate"&&ws._pc){
        try{await ws._pc.addIceCandidate(new RTCIceCandidate(m.payload))}catch(e){}
      }else if(m.type==="open"&&role==="host"){
        // a guest just appeared — send offer
        const pc=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
        const dc=pc.createDataChannel("moon",{ordered:true});
        setupDC(dc);
        ws._pc=pc;
        pc.onicecandidate=ev=>{if(ev.candidate)ws.send(JSON.stringify({src:myId,dst:peerId,type:"candidate",payload:ev.candidate}))};
        const offer=await pc.createOffer();await pc.setLocalDescription(offer);
        ws.send(JSON.stringify({src:myId,dst:m.src,type:"offer",payload:offer}));
      }
    };
    ws.onerror=()=>done(false);
    ws.onclose=()=>{if(!got)done(false)};
    function setupDC(dc){
      dc.onopen=()=>{
        setStatus("connected");$("#statusDot").className="dot on";
        S.conn={send:data=>dc.send(data),close:()=>{dc.close();try{ws.close()}catch(e){}}};
        S.peer={ws};
        enterChat();
        flushQueue();
        done(true);
        got=true;
      };
      dc.onmessage=async ev=>{
        let data;try{data=JSON.parse(ev.data)}catch{return};
        if(data.t==="m"){
          const m=await decrypt({iv:data.iv,ct:data.ct},S.key);
          renderIncoming(m);
        }else if(data.t==="read")markRead(data.id);
        else if(data.t==="typing")showTyping();
      };
    }
  });
}

// ===== POLL FOR GUEST (manual fallback if user just hits send) =====
let pollT;
async function pollGuest(){
  clearInterval(pollT);
  pollT=setInterval(async()=>{
    const r=await dbGet(CFG,"pair");
    if(r&&r.v&&r.v.got&&r.v.peerId){
      clearInterval(pollT);
      // switch to chat (or wait for broker)
      // broker path already initiated; just enterChat if connection open
      if(S.conn){
        enterChat();
      }else{
        // try connecting via broker now
        await tryBrokerPair(r.v.myId,r.v.peerId||("ml-x"),"host");
      }
    }
  },1000);
}

// ===== MESSAGES =====
async function saveMsg(m){
  const c=await encrypt(m,S.key);
  await dbPut(MSG,{id:m.id,iv:c.iv,ct:c.ct,ts:m.ts,from:m.from});
}
async function loadMsg(){
  const all=await dbAll(MSG);
  const out=[];
  for(const r of all){
    try{const m=await decrypt({iv:r.iv,ct:r.ct},S.key);out.push({...m,id:r.id,ts:r.ts})}catch{}
  }
  return out.sort((a,b)=>a.ts-b.ts);
}

$("#msgInput").addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}
});
$("#msgInput").addEventListener("input",()=>{
  const t=$("#msgInput");t.style.height="auto";t.style.height=Math.min(140,t.scrollHeight)+"px";
});
$("#sendBtn").addEventListener("click",send);
$("#fileInput").addEventListener("change",async e=>{
  const f=e.target.files[0];if(!f)return;
  if(f.size>100*1024*1024){toast("too big — max 100mb");e.target.value="";return}
  const r=new FileReader();
  r.onload=async()=>{
    const isV=f.type.startsWith("video/"),isI=f.type.startsWith("image/");
    if(!isV&&!isI){toast("images or videos only");return}
    const m={id:rand(12).reduce((s,x)=>s+x.toString(16).padStart(2,"0"),""),type:isV?"video":"image",dataUrl:r.result,ts:Date.now(),from:"me",fileName:f.name,fileSize:f.size};
    await saveMsg(m);
    renderMsg(m,"me");
    sendWire(m);
  };
  r.readAsDataURL(f);
  e.target.value="";
});

async function send(){
  const txt=$("#msgInput").value.trim();if(!txt)return;
  $("#msgInput").value="";$("#msgInput").style.height="auto";
  const m={id:rand(12).reduce((s,x)=>s+x.toString(16).padStart(2,"0"),""),type:"text",text:txt,ts:Date.now(),from:"me"};
  await saveMsg(m);renderMsg(m,"me");sendWire(m);
}

async function sendWire(m){
  if(!S.conn){
    toast("not connected yet");return;
  }
  const c=await encrypt(m,S.key);
  const wire={t:"m",iv:c.iv,ct:c.ct,id:m.id,ts:m.ts};
  try{S.conn.send(JSON.stringify(wire))}catch(e){offlineQueue.push(wire)}
}

function flushQueue(){
  while(offlineQueue.length&&S.conn){const m=offlineQueue.shift();S.conn.send(JSON.stringify(m))}
}

function renderMsg(m,who){
  const list=$("#messages");
  const d=document.createElement("div");d.className="msg from-"+who;d.dataset.id=m.id;
  const b=document.createElement("div");b.className="bubble";
  if(m.type==="image"){b.classList.add("img");const i=document.createElement("img");i.src=m.dataUrl;i.onclick=()=>openMedia("img",m.dataUrl);b.appendChild(i)}
  else if(m.type==="video"){b.classList.add("vid");const v=document.createElement("video");v.src=m.dataUrl;v.controls=true;b.appendChild(v)}
  else{b.textContent=m.text}
  d.appendChild(b);
  const ml=document.createElement("div");ml.className="meta-line";
  const t=new Date(m.ts);const hh=String(t.getHours()).padStart(2,"0"),mm=String(t.getMinutes()).padStart(2,"0");
  ml.innerHTML=`<span>${hh}:${mm}</span>`+(who==="me"?`<span class="read wait" data-rid="${m.id}">sent</span>`:"");
  d.appendChild(ml);
  list.appendChild(d);
  $("#messages").scrollTo({top:9e9,behavior:"smooth"});
}
function renderIncoming(m){renderMsg(m,"them");const r=document.querySelector(`[data-rid="${m.id}"]`);if(!r)return}
function markRead(id){const e=document.querySelector(`[data-rid="${id}"]`);if(e){e.classList.remove("wait");e.classList.add("read");e.textContent="read"}}

function openMedia(k,u){const w=$("#mediaWrap");w.innerHTML="";const e=k==="img"?document.createElement("img"):document.createElement("video");e.src=u;if(k!=="img")e.controls=true;w.appendChild(e);$("#mediaModal").classList.add("on")}
$("#mediaModal").addEventListener("click",()=>$("#mediaModal").classList.remove("on"));

async function enterChat(){
  screen("chat");
  const msgs=await loadMsg();
  const list=$("#messages");list.innerHTML="";
  for(const m of msgs)renderMsg(m,m.from==="me"?"me":"them");
  $("#messages").scrollTo({top:9e9});
}

$("#exitBtn").addEventListener("click",()=>{
  if(confirm("are you sure? (this does NOT wipe your messages)")){
    if(S.conn)try{S.conn.close()}catch(e){};
    screen("lock");$("#pw").value="";
  }
});

// ===== QR (very simple — wraps qrcode-generator if loaded, else text fallback) =====
function renderQR(box,text){
  box.innerHTML="";
  if(typeof qrcode==="function"){
    try{
      const q=qrcode(0,"L");q.addData(text);q.make();
      const n=q.getModuleCount();const s=Math.floor(200/n);
      const c=document.createElement("canvas");c.width=n*s;c.height=n*s;
      const ctx=c.getContext("2d");ctx.fillStyle="#000";ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle="#fff";
      for(let y=0;y<n;y++)for(let x=0;x<n;x++)if(q.isDark(y,x))ctx.fillRect(x*s,y*s,s,s);
      box.appendChild(c);return;
    }catch(e){}
  }
  // fallback: text
  box.style.cssText+=";background:#fff;color:#000;display:flex;align-items:center;justify-content:center;font-size:12px;padding:10px;line-height:1.4;text-align:center;word-break:break-all;";
  box.textContent=text;
}

// ===== MOON TRIPLE TAP = PANIC =====
let moonTaps=0,moonT=0;
$("#moon").addEventListener("click",()=>{
  moonTaps++;clearTimeout(moonT);
  moonT=setTimeout(()=>{moonTaps=0},800);
  if(moonTaps>=3){
    moonTaps=0;
    if(confirm("WIPE everything? cannot undo.")){
      indexedDB.deleteDatabase(DB_NAME);
      setTimeout(()=>location.href=location.origin+location.pathname,300);
    }
  }
});

// ===== KONAMI =====
const K=["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowLeft","ArrowRight","ArrowLeft","ArrowRight","b","a"];
let kI=0;
window.addEventListener("keydown",e=>{
  const k=e.key.length===1?e.key.toLowerCase():e.key;
  if(k===K[kI]){kI++;if(kI===K.length){kI=0;for(let i=0;i<40;i++)setTimeout(spawnEmber,i*30);toast("🌙 the moon remembers you both",2500)}}
  else kI=k===K[0]?1:0;
});

// ===== SW (PWA, optional) =====
if("serviceWorker"in navigator&&location.protocol!=="file:"){
  window.addEventListener("load",()=>{navigator.serviceWorker.register("./sw.js").catch(()=>{})});
}
